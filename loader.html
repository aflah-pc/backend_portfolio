<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading... | Aflah Muneer PC</title>
  <style>
    /* ── Reset & Page ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0a0a0a;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      gap: 28px;
    }

    /* ── Subtle radial glow behind loader ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(59,130,246,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Newton's Cradle – from Uiverse.io by dovatgabriel ── */
    .newtons-cradle {
      --uib-size: 80px;   /* scaled up for visibility */
      --uib-speed: 1.2s;
      --uib-color: #3b82f6; /* brand blue to match portfolio */
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: var(--uib-size);
      height: var(--uib-size);
    }

    .newtons-cradle__dot {
      position: relative;
      display: flex;
      align-items: center;
      height: 100%;
      width: 25%;
      transform-origin: center top;
    }

    .newtons-cradle__dot::after {
      content: '';
      display: block;
      width: 100%;
      height: 25%;
      border-radius: 50%;
      background-color: var(--uib-color);
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
    }

    .newtons-cradle__dot:first-child {
      animation: swing var(--uib-speed) linear infinite;
    }

    .newtons-cradle__dot:last-child {
      animation: swing2 var(--uib-speed) linear infinite;
    }

    @keyframes swing {
      0%  { transform: rotate(0deg);  animation-timing-function: ease-out; }
      25% { transform: rotate(70deg); animation-timing-function: ease-in;  }
      50% { transform: rotate(0deg);  animation-timing-function: linear;   }
    }

    @keyframes swing2 {
      0%  { transform: rotate(0deg);   animation-timing-function: linear;   }
      50% { transform: rotate(0deg);   animation-timing-function: ease-out; }
      75% { transform: rotate(-70deg); animation-timing-function: ease-in;  }
    }

    /* ── Loading text ── */
    .loading-text {
      color: #a1a1aa;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1;   }
    }

    /* ── Brand name ── */
    .brand {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(90deg, #3b82f6, #06b6d4, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>

  <span class="brand">Aflah Muneer PC</span>

  <!-- Newton's Cradle Loader -->
  <div class="newtons-cradle">
    <div class="newtons-cradle__dot"></div>
    <div class="newtons-cradle__dot"></div>
    <div class="newtons-cradle__dot"></div>
    <div class="newtons-cradle__dot"></div>
  </div>

  <p class="loading-text">Loading...</p>

</body>
</html>
